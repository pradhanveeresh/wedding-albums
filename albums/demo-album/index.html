<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Album</title>
  <style>
    body {
      margin: 0;
      background: #0f0f10;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #1b1b1d;
      border: 1px solid #2d2d2f;
      border-radius: 20px;
      padding: 30px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 20px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: white;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.12);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Demo Album</h1>
    <p>Album folder structure is ready.</p>
    <p>Next step: real premium flipbook viewer.</p>
    <a class="btn" href="../../">Back to Root</a>
  </div>
</body>
</html>
