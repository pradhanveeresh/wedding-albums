<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Premium Album</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="ambient-glow"></div>

    <header class="topbar">
      <a class="back-btn" href="../../">←</a>
      <div class="album-title-wrap">
        <div class="album-title">Wedding Premium</div>
        <div class="album-subtitle">Premium Digital Album</div>
      </div>
      <div class="topbar-spacer"></div>
    </header>

    <main class="viewer-stage">
      <div class="book-outer">
        <div class="book-shadow"></div>

        <div class="book-shell">
          <div class="book-cover-left"></div>
          <div class="book-cover-right"></div>
          <div class="book-spine"></div>

          <div class="spread">
            <section class="page page-left">
              <div class="page-safe">
                <canvas id="leftCanvas"></canvas>
                <div class="page-placeholder" id="leftPlaceholder">Loading left page...</div>
              </div>
            </section>

            <section class="page page-right">
              <div class="page-safe">
                <canvas id="rightCanvas"></canvas>
                <div class="page-placeholder" id="rightPlaceholder">Loading right page...</div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>

    <div class="controls-wrap">
      <div class="controls">
        <button class="ctrl-btn" id="prevBtn" title="Previous">‹</button>
        <button class="ctrl-btn" id="zoomOutBtn" title="Zoom Out">－</button>
        <div class="page-indicator" id="pageIndicator">Pages 1–2</div>
        <button class="ctrl-btn" id="zoomInBtn" title="Zoom In">＋</button>
        <button class="ctrl-btn" id="nextBtn" title="Next">›</button>
        <button class="ctrl-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
      </div>
    </div>

    <div class="status-line" id="statusLine">Ready</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.js';
    }
  </script>
  <script src="./assets/js/app.js"></script>
</body>
</html>
