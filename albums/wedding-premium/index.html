<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Premium</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand">Wedding Premium</div>
      <div class="top-actions">
        <button class="ghost-btn" id="prevBtn">‹</button>
        <button class="ghost-btn" id="nextBtn">›</button>
      </div>
    </header>

    <main class="viewer-stage">
      <section class="album-stage">
        <div class="album-floor-shadow"></div>

        <div class="album-book">
          <div class="book-depth"></div>

          <div class="spread">
            <div class="page left-page">
              <div class="page-inner">
                <div class="page-label">LEFT PAGE</div>
                <div class="page-content">
                  Safe margin zone<br />
                  Future PDF page fit here
                </div>
              </div>
            </div>

            <div class="gutter"></div>

            <div class="page right-page">
              <div class="page-inner">
                <div class="page-label">RIGHT PAGE</div>
                <div class="page-content">
                  Safe margin zone<br />
                  Future PDF page fit here
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div class="helper-note">
        Open-book premium shell ready.<br />
        Next: real PDF pages + realistic controlled page turn.
      </div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
